<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="app">
      <!-- Auth-sektion (visas först) -->
      <div id="authSection">
        <h2>Logga in</h2>
        <form id="loginForm">
          <label for="loginEmail">E-post:</label>
          <input id="loginEmail" type="email" required />
          <label for="loginPassword">Lösenord:</label>
          <input id="loginPassword" type="password" required />
          <button type="submit">Logga in</button>
        </form>

        <h2>Registrera</h2>
        <form id="registerForm">
          <label for="registerName">Användarnamn:</label>
          <input id="registerName" type="text" required />
          <label for="registerEmail">E-post:</label>
          <input id="registerEmail" type="email" required />
          <label for="registerPassword">Lösenord:</label>
          <input id="registerPassword" type="password" required />
          <button type="submit">Registrera</button>
        </form>
      </div>

      <!-- Auktions-sektion (dold tills inloggad) -->
      <div id="auctionSection" style="display: none">
        <form id="auctionForm">
          <label for="title">Title:</label>
          <input id="title" type="text" name="title" />
          <label for="img">Image:</label>
          <input type="file" id="img" />
          <label for="description">Description:</label>
          <textarea id="description"></textarea>
          <label for="startPrice">Start price:</label>
          <input id="startPrice" type="number" />
          <label for="enddate">End date:</label>
          <input id="enddate" type="date" />
          <label for="endTime">Endtime:</label>
          <input id="endTime" type="time" />
          <button type="submit">Post auction</button>
        </form>

        <div id="auctions"></div>
      </div>

      <div id="budgivning">
        <div id="chathistory"></div>

        <form id="msgform">
          <input id="msgInput" class="hide" />
          <button id="sendmsg" type="submit" class="hide">send message</button>
        </form>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
