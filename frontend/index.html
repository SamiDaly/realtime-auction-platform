<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="authSection">
      <!-- Hero-vy -->
      <div id="heroView">
        <h1>Vintage Auction</h1>
        <p>En unik möjlighet att köpa till ett riktigt bra pris. Lägg ditt bud och säkra varan innan auktionen avslutas.</p>
        <div class="hero-buttons">
          <button id="showLogin" class="btn-filled">Logga in</button>
          <button id="showRegister" class="btn-outline">Registrera dig</button>
        </div>
      </div>

      <!-- Login-formulär -->
      <div id="loginView" style="display: none;">
        <h2>Logga in</h2>
        <form id="loginForm">
          <input id="loginEmail" type="email" placeholder="E-post" required />
          <input id="loginPassword" type="password" placeholder="Lösenord" required />
          <button type="submit" class="btn-filled">Logga in</button>
        </form>
        <button id="backFromLogin" class="btn-link">Tillbaka</button>
      </div>

      <!-- Register-formulär -->
      <div id="registerView" style="display: none;">
        <h2>Registrera dig</h2>
        <form id="registerForm">
          <input id="registerName" type="text" placeholder="Användarnamn" required />
          <input id="registerEmail" type="email" placeholder="E-post" required />
          <input id="registerPassword" type="password" placeholder="Lösenord" required />
          <button type="submit" class="btn-filled">Registrera dig</button>
        </form>
        <button id="backFromRegister" class="btn-link">Tillbaka</button>
      </div>
    </div>

    <!-- Auktion-vy -->
      <div id="auctionSection" style="display: none">

      <div class="auction-header">
        <h1>Skapa Auktion</h1>
      <button id="logoutBtn" class="btn-outline">Logga ut</button>
      </div>
   
      <hr class="section-divider" />

      <div id="auctionContainer">
        <div id="auctionFormContainer">
      <form id="auctionForm">

        <label for="title">Titel:</label>
        <input id="title" type="text" name="title" required />
        
        
        <label for="img">Bild:</label>
        <input type="file" id="img" accept="image/*" required />
        <p id="error" class="error" style="color: red;"></p>
       
        <label for="description">Beskrivning:</label>
        <textarea id="description" required></textarea>
      
        <label for="startPrice">Startpris:</label>
        <input id="startPrice" type="number" min="1" required/>
     
        <label for="endTime">Minuter:</label>
        <input id="endTime" type="number" placeholder="Antal minuter" min="1" max="5" required/>
          
      
        <button type="submit">Skapa Auktion</button>
      </form>
</div>

      <div id="auctions"></div>
      </div>
      

    <!-- Auktion Detalj-vy -->
   
      <div id="auctionDetail" class="hide ">
      <div class="detail-layout">
      <div class="detail-info">
      <h2 id="detailTitle"></h2>
      <img id="detailImg" />

      <div class="detailText">
      <h3 id="detailPrice"></h3>
      <p id="detailDescription"></p>
      <h4 id="detailCreator"></h4>
      <p id="detailTime"></p>
      </div>


      </div>
      <div class="detail-bidding">

      <div id="chathistory"></div>
       
        <form id="msgform">
          <input id="msgInput" type="number" placeholder="Ange bud i kr"/>
          <button id="sendmsg" type="submit" class="hide">Lägg bud</button>
        </form>
    <button id="backToAuctions" class="back-button" style="color: #1a1a1a;">Tillbaka till auktioner</button>
</div>
</div>


    
     <!----  <div id="winner"></div> -->
    </div>
     <div class="popup hide">
     <div id="winner"></div>
     <button class="close">OK</button>
     </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
